<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sitio en Mantenimiento - Homero Motos</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap');
        body {
            background-color: #0f172a;
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }
        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 20px;
            color: #f59e0b;
        }
        p {
            font-size: 16px;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
            display: inline-block;
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⚙️</div>
        <h1>Sitio en Mantenimiento</h1>
        <p>Estamos realizando mejoras programadas en el sistema para brindarle un servicio más rápido y seguro. Por favor, vuelva a intentarlo más tarde.</p>
        <p style="font-size: 13px; color: #64748b;">Administración Homero Motos</p>
    </div>
</body>
</html>
