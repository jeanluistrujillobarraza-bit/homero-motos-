<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: html(title='Catálogo de Motocicletas', pageTitle='Inventario de Motocicletas', content=~{::#motos-content}, extraStyle=~{::style})}">
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-sidebar: #0f172a;
            --border-color: #e2e8f0;
            --border-hover: #cbd5e1;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent-blue: #2563eb;
            --accent-blue-bg: #eff6ff;
            --accent-emerald: #10b981;
            --accent-emerald-bg: #ecfdf5;
            --accent-orange: #f59e0b;
            --accent-orange-bg: #fffbeb;
            --accent-rose: #ef4444;
            --accent-rose-bg: #fef2f2;
            --accent-purple: #8b5cf6;
            --accent-purple-bg: #f5f3ff;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --sidebar-width: 260px;
            --border-radius: 12px;
            --transition-smooth: all 0.2s ease-in-out;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Clean Panel (White Card) */
        .glass-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px -1px rgba(0, 0, 0, 0.05);
            transition: var(--transition-smooth);
        }
        .glass-panel:hover {
            border-color: var(--border-hover);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
        }

        /* App Layout */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styling */
        .app-sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 40px;
            letter-spacing: -0.5px;
        }
        .sidebar-logo i {
            color: var(--accent-blue);
        }

        .sidebar-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
            transition: var(--transition-smooth);
        }

        .sidebar-link:hover, .sidebar-link.active {
            color: #ffffff;
        }
        .sidebar-link:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .sidebar-link.active {
            background: #1e293b;
            font-weight: 600;
        }

        .sidebar-user {
            margin-top: auto;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-user-name {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-user-role {
            font-size: 11px;
            color: var(--accent-emerald);
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .btn-logout {
            margin-top: 10px;
            display: inline-block;
            color: #f87171;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
        }
        .btn-logout:hover {
            text-decoration: underline;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 40px;
            max-width: 1400px;
            width: calc(100% - var(--sidebar-width));
        }

        /* Header */
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            max-width: 450px;
            width: 100%;
        }

        .input-search {
            flex: 1;
            background: #ffffff;
            border: 1px solid #cbd5e1;
            padding: 10px 18px;
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 14px;
            transition: var(--transition-smooth);
        }
        .input-search:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: var(--font-sans);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: var(--transition-smooth);
            font-size: 14px;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: #ffffff;
        }
        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        .btn-success {
            background: var(--accent-emerald);
            color: #ffffff;
        }
        .btn-success:hover {
            background: #059669;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #ffffff;
            color: var(--text-primary);
            border: 1px solid #cbd5e1;
        }
        .btn-secondary:hover {
            background: #f1f5f9;
        }

        .btn-danger {
            background: var(--accent-rose);
            color: #ffffff;
        }
        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-1px);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 6px;
        }

        /* Forms (Shared) */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            background: #ffffff;
            border: 1px solid #cbd5e1;
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 14px;
            transition: var(--transition-smooth);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        /* Tables (Shared) */
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        .custom-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .custom-table th {
            background: #f8fafc;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 13px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .custom-table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            color: var(--text-primary);
        }

        .custom-table tr:hover td {
            background: #f8fafc;
        }
        .custom-table tr:last-child td {
            border-bottom: none;
        }

        /* Alerts (Shared) */
        .alert {
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
            border: 1px solid transparent;
        }
        .alert-danger {
            background: var(--accent-rose-bg);
            color: var(--accent-rose);
            border-color: rgba(239, 68, 68, 0.2);
        }
        .alert-success {
            background: var(--accent-emerald-bg);
            color: var(--accent-emerald);
            border-color: rgba(16, 185, 129, 0.2);
        }

        /* Badges (Shared) */
        .moto-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-disponible { background: var(--accent-emerald-bg); color: var(--accent-emerald); border: 1px solid rgba(16, 185, 129, 0.3); }
        .badge-en-financiacion { background: var(--accent-blue-bg); color: var(--accent-blue); border: 1px solid rgba(37, 99, 235, 0.3); }
        .badge-pago_vencido { background: var(--accent-rose-bg); color: var(--accent-rose); border: 1px solid rgba(239, 68, 68, 0.3); }
        .badge-pagada { background: var(--accent-emerald); color: #ffffff; }
        .badge-vendida { background: #64748b; color: #ffffff; }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .app-sidebar {
                display: none;
            }
            .main-content {
                margin-left: 0;
                width: 100%;
                padding: 20px;
            }
        }

        /* Motorcycles Specific Styles */
        .motorcycles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 24px;
        }
        .moto-card {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 0;
            overflow: hidden;
        }
        .moto-img-container {
            height: 180px;
            width: 100%;
            background: #f1f5f9;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .moto-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .moto-no-img {
            color: var(--text-muted);
            font-size: 40px;
        }
        .moto-body {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .moto-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--text-primary);
        }
        .moto-placa {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent-blue);
            background: var(--accent-blue-bg);
            padding: 2px 8px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 12px;
            width: fit-content;
        }
        .moto-spec {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        .moto-price {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-primary);
            margin-top: auto;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }
        .moto-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div id="motos-content">
        <!-- Action bar -->
        <div style="display: flex; justify-content: flex-end; margin-bottom: 24px;">
            <a th:href="@{/motorcycles/new}" class="btn btn-success glowing-btn">
                <i class="fa-solid fa-plus"></i> Registrar Motocicleta
            </a>
        </div>

        <!-- Grid of Motorcycles -->
        <div class="motorcycles-grid">
            <div class="glass-panel moto-card" th:each="moto : ${motorcycles}">
                <!-- Photo Container -->
                <div class="moto-img-container">
                    <img th:if="${moto.fotoBase64 != null && !moto.fotoBase64.isEmpty()}" 
                         th:src="${moto.fotoBase64}" class="moto-img" alt="Foto motocicleta">
                    <div th:unless="${moto.fotoBase64 != null && !moto.fotoBase64.isEmpty()}" class="moto-no-img">
                        <i class="fa-solid fa-motorcycle"></i>
                    </div>
                    
                    <!-- Badge -->
                    <span class="moto-badge" th:classappend="'badge-' + ${#strings.toLowerCase(moto.estado)}" th:text="${#strings.replace(moto.estado, '_', ' ')}">Disponible</span>
                </div>
                
                <!-- Body -->
                <div class="moto-body">
                    <span class="moto-placa" th:text="${moto.placa}">ABC-123</span>
                    <h3 class="moto-title" th:text="${moto.marca + ' ' + moto.modelo}">Marca Modelo</h3>
                    
                    <div class="moto-spec">
                        <span>Año:</span>
                        <strong th:text="${moto.anio}">2026</strong>
                    </div>
                    <div class="moto-spec">
                        <span>Cilindraje:</span>
                        <strong th:text="${moto.cilindraje}">150 cc</strong>
                    </div>
                    <div class="moto-spec">
                        <span>Color:</span>
                        <strong th:text="${moto.color}">Negro</strong>
                    </div>
                    <div class="moto-spec">
                        <span>VIN:</span>
                        <strong th:text="${moto.vin}">123456...</strong>
                    </div>

                    <div class="moto-price" th:text="${'$' + #numbers.formatDecimal(moto.precioVenta, 1, 'POINT', 0, 'COMMA')}">$0.00</div>
                    
                    <!-- Actions -->
                    <div class="moto-actions">
                        <!-- Sell / Finance action -->
                        <a th:if="${moto.estado == 'DISPONIBLE'}" th:href="@{/financing/new(motorcycleId=${moto.id})}" class="btn btn-primary btn-sm" style="flex: 1;">
                            <i class="fa-solid fa-file-invoice-dollar"></i> Financiar
                        </a>
                        <!-- View Credit details -->
                        <a th:unless="${moto.estado == 'DISPONIBLE'}" th:href="@{/financing/search(query=${moto.placa})}" class="btn btn-secondary btn-sm" style="flex: 1;">
                            <i class="fa-solid fa-eye"></i> Ver Crédito
                        </a>
                        <!-- Restore Financing (Admin/Super Admin/Business Admin) -->
                        <a sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_SUPER_ADMIN', 'ROLE_BUSINESS_ADMIN')"
                           th:unless="${moto.estado == 'DISPONIBLE'}" 
                           th:href="@{/motorcycles/restore-financing/{id}(id=${moto.id})}" 
                           class="btn btn-warning btn-sm" 
                           style="background: #f59e0b; border-color: #f59e0b; color: #fff; display: flex; align-items: center; justify-content: center; gap: 4px; padding: 4px 8px; font-size: 12px; text-decoration: none; border-radius: 6px;"
                           onclick="return confirm('¿Está seguro de que desea restaurar la financiación de esta motocicleta? Esta acción eliminará permanentemente el crédito actual y sus pagos, y la moto volverá a estar disponible para financiar.');">
                            <i class="fa-solid fa-rotate-left"></i> Restaurar
                        </a>
                        <!-- Edit -->
                        <a th:href="@{/motorcycles/edit/{id}(id=${moto.id})}" class="btn btn-secondary btn-sm" title="Editar">
                            <i class="fa-solid fa-pen"></i>
                        </a>
                        <!-- Delete (Admin / Super Admin / Business Admin) -->
                        <a sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_SUPER_ADMIN', 'ROLE_BUSINESS_ADMIN')" 
                           th:if="${#authorization.expression('hasRole(''ROLE_SUPER_ADMIN'')') or moto.estado != 'EN_FINANCIACION'}"
                           th:href="@{/motorcycles/delete/{id}(id=${moto.id})}" 
                           class="btn btn-danger btn-sm" 
                           onclick="return confirm('¿Está seguro de que desea eliminar esta motocicleta? Si está financiada, se eliminará el crédito y todos sus pagos asociados.');" 
                           title="Eliminar">
                            <i class="fa-solid fa-trash"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(motorcycles)}" style="text-align: center; padding: 60px 0; color: var(--text-secondary);">
            <i class="fa-solid fa-motorcycle" style="font-size: 48px; margin-bottom: 15px; display: block;"></i>
            <p>No hay motocicletas registradas en el inventario.</p>
        </div>
    </div>
</body>
</html>
