<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: html(title=${motorcycle.id == null ? 'Registrar Motocicleta' : 'Editar Motocicleta'}, pageTitle=${motorcycle.id == null ? 'Registrar Motocicleta' : 'Editar Motocicleta'}, content=~{::#moto-form-content}, extraStyle=~{::style})}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-sidebar: #0f172a;
            --border-color: #e2e8f0;
            --border-hover: #cbd5e1;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent-blue: #2563eb;
            --accent-blue-bg: #eff6ff;
            --accent-emerald: #10b981;
            --accent-emerald-bg: #ecfdf5;
            --accent-orange: #f59e0b;
            --accent-orange-bg: #fffbeb;
            --accent-rose: #ef4444;
            --accent-rose-bg: #fef2f2;
            --accent-purple: #8b5cf6;
            --accent-purple-bg: #f5f3ff;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --sidebar-width: 260px;
            --border-radius: 12px;
            --transition-smooth: all 0.2s ease-in-out;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Clean Panel (White Card) */
        .glass-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px -1px rgba(0, 0, 0, 0.05);
            transition: var(--transition-smooth);
        }
        .glass-panel:hover {
            border-color: var(--border-hover);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
        }

        /* App Layout */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styling */
        .app-sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 40px;
            letter-spacing: -0.5px;
        }
        .sidebar-logo i {
            color: var(--accent-blue);
        }

        .sidebar-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
            transition: var(--transition-smooth);
        }

        .sidebar-link:hover, .sidebar-link.active {
            color: #ffffff;
        }
        .sidebar-link:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .sidebar-link.active {
            background: #1e293b;
            font-weight: 600;
        }

        .sidebar-user {
            margin-top: auto;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-user-name {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-user-role {
            font-size: 11px;
            color: var(--accent-emerald);
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .btn-logout {
            margin-top: 10px;
            display: inline-block;
            color: #f87171;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
        }
        .btn-logout:hover {
            text-decoration: underline;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 40px;
            max-width: 1400px;
            width: calc(100% - var(--sidebar-width));
        }

        /* Header */
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            max-width: 450px;
            width: 100%;
        }

        .input-search {
            flex: 1;
            background: #ffffff;
            border: 1px solid #cbd5e1;
            padding: 10px 18px;
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 14px;
            transition: var(--transition-smooth);
        }
        .input-search:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: var(--font-sans);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: var(--transition-smooth);
            font-size: 14px;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: #ffffff;
        }
        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        .btn-success {
            background: var(--accent-emerald);
            color: #ffffff;
        }
        .btn-success:hover {
            background: #059669;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #ffffff;
            color: var(--text-primary);
            border: 1px solid #cbd5e1;
        }
        .btn-secondary:hover {
            background: #f1f5f9;
        }

        .btn-danger {
            background: var(--accent-rose);
            color: #ffffff;
        }
        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-1px);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 6px;
        }

        /* Forms (Shared) */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            background: #ffffff;
            border: 1px solid #cbd5e1;
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 14px;
            transition: var(--transition-smooth);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        /* Tables (Shared) */
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        .custom-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .custom-table th {
            background: #f8fafc;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 13px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .custom-table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            color: var(--text-primary);
        }

        .custom-table tr:hover td {
            background: #f8fafc;
        }
        .custom-table tr:last-child td {
            border-bottom: none;
        }

        /* Alerts (Shared) */
        .alert {
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
            border: 1px solid transparent;
        }
        .alert-danger {
            background: var(--accent-rose-bg);
            color: var(--accent-rose);
            border-color: rgba(239, 68, 68, 0.2);
        }
        .alert-success {
            background: var(--accent-emerald-bg);
            color: var(--accent-emerald);
            border-color: rgba(16, 185, 129, 0.2);
        }

        /* Badges (Shared) */
        .moto-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-disponible { background: var(--accent-emerald-bg); color: var(--accent-emerald); border: 1px solid rgba(16, 185, 129, 0.3); }
        .badge-en-financiacion { background: var(--accent-blue-bg); color: var(--accent-blue); border: 1px solid rgba(37, 99, 235, 0.3); }
        .badge-pago_vencido { background: var(--accent-rose-bg); color: var(--accent-rose); border: 1px solid rgba(239, 68, 68, 0.3); }
        .badge-pagada { background: var(--accent-emerald); color: #ffffff; }
        .badge-vendida { background: #64748b; color: #ffffff; }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .app-sidebar {
                display: none;
            }
            .main-content {
                margin-left: 0;
                width: 100%;
                padding: 20px;
            }
        }
    </style>
<body>
    <div id="moto-form-content" class="glass-panel" style="max-width: 800px; margin: 0 auto;">
        <form th:action="@{/motorcycles/save}" th:object="${motorcycle}" method="post" enctype="multipart/form-data">
            <!-- Hidden ID field for updates -->
            <input type="hidden" th:field="*{id}">

            <div class="form-row">
                <div class="form-group">
                    <label for="placa" class="form-label">Placa (Única)</label>
                    <input type="text" id="placa" th:field="*{placa}" class="form-control" placeholder="Ej. ABC12D" required th:readonly="${motorcycle.id != null}">
                </div>
                <div class="form-group">
                    <label for="marca" class="form-label">Marca</label>
                    <input type="text" id="marca" th:field="*{marca}" class="form-control" placeholder="Ej. Honda" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="modelo" class="form-label">Modelo / Línea</label>
                    <input type="text" id="modelo" th:field="*{modelo}" class="form-control" placeholder="Ej. CB190R" required>
                </div>
                <div class="form-group">
                    <label for="anio" class="form-label">Año</label>
                    <input type="number" id="anio" th:field="*{anio}" class="form-control" placeholder="Ej. 2026" min="1900" max="2100" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="color" class="form-label">Color</label>
                    <input type="text" id="color" th:field="*{color}" class="form-control" placeholder="Ej. Rojo/Negro" required>
                </div>
                <div class="form-group">
                    <label for="cilindraje" class="form-label">Cilindraje</label>
                    <input type="text" id="cilindraje" th:field="*{cilindraje}" class="form-control" placeholder="Ej. 190 cc" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="vin" class="form-label">Número de Chasis (VIN) - Único</label>
                    <input type="text" id="vin" th:field="*{vin}" class="form-control" placeholder="Ingrese el VIN" required>
                </div>
                <div class="form-group">
                    <label for="numeroMotor" class="form-label">Número de Motor - Único</label>
                    <input type="text" id="numeroMotor" th:field="*{numeroMotor}" class="form-control" placeholder="Ingrese el número de motor" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="precioVenta" class="form-label">Precio Total de Venta ($)</label>
                    <input type="number" step="0.01" id="precioVenta" th:field="*{precioVenta}" class="form-control" placeholder="Ej. 12500000" required>
                </div>
                <div class="form-group">
                    <label for="imageFile" class="form-label">Fotografía de la Motocicleta</label>
                    <input type="file" id="imageFile" name="imageFile" class="form-control" accept="image/*">
                </div>
            </div>

            <div class="form-group">
                <label for="observaciones" class="form-label">Observaciones</label>
                <textarea id="observaciones" th:field="*{observaciones}" class="form-control" rows="4" placeholder="Detalles o especificaciones adicionales..."></textarea>
            </div>

            <!-- Image preview if editing -->
            <div th:if="${motorcycle.fotoBase64 != null && !motorcycle.fotoBase64.isEmpty()}" class="form-group">
                <label class="form-label">Imagen Actual:</label>
                <div style="max-width: 200px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color);">
                    <img th:src="${motorcycle.fotoBase64}" style="width: 100%; display: block;" alt="Imagen actual">
                </div>
            </div>

            <div style="display: flex; gap: 15px; justify-content: flex-end; margin-top: 30px;">
                <a th:href="@{/motorcycles}" class="btn btn-secondary">
                    Cancelar
                </a>
                <button type="submit" class="btn btn-success glowing-btn">
                    <i class="fa-solid fa-floppy-disk"></i> Guardar Motocicleta
                </button>
            </div>
        </form>
    </div>
</body>
</html>
