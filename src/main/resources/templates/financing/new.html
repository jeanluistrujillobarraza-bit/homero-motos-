<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: html(title='Registrar Venta y Financiación', pageTitle='Nueva Venta y Financiación', content=~{::#new-financing-content}, extraStyle=~{::style})}">
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-sidebar: #0f172a;
            --border-color: #e2e8f0;
            --border-hover: #cbd5e1;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent-blue: #2563eb;
            --accent-blue-bg: #eff6ff;
            --accent-emerald: #10b981;
            --accent-emerald-bg: #ecfdf5;
            --accent-orange: #f59e0b;
            --accent-orange-bg: #fffbeb;
            --accent-rose: #ef4444;
            --accent-rose-bg: #fef2f2;
            --accent-purple: #8b5cf6;
            --accent-purple-bg: #f5f3ff;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --sidebar-width: 260px;
            --border-radius: 12px;
            --transition-smooth: all 0.2s ease-in-out;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Clean Panel (White Card) */
        .glass-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px -1px rgba(0, 0, 0, 0.05);
            transition: var(--transition-smooth);
        }
        .glass-panel:hover {
            border-color: var(--border-hover);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
        }

        /* App Layout */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styling */
        .app-sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 40px;
            letter-spacing: -0.5px;
        }
        .sidebar-logo i {
            color: var(--accent-blue);
        }

        .sidebar-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
            transition: var(--transition-smooth);
        }

        .sidebar-link:hover, .sidebar-link.active {
            color: #ffffff;
        }
        .sidebar-link:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .sidebar-link.active {
            background: #1e293b;
            font-weight: 600;
        }

        .sidebar-user {
            margin-top: auto;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-user-name {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-user-role {
            font-size: 11px;
            color: var(--accent-emerald);
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .btn-logout {
            margin-top: 10px;
            display: inline-block;
            color: var(--accent-rose);
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            transition: var(--transition-smooth);
        }
        .btn-logout:hover {
            text-decoration: underline;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 40px;
            max-width: 1400px;
            width: calc(100% - var(--sidebar-width));
        }

        /* Header */
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .search-bar {
            display: flex;
            gap: 10px;
            max-width: 450px;
            width: 100%;
        }

        .input-search {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 10px 18px;
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--font-sans);
            transition: var(--transition-smooth);
        }
        .input-search:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: var(--font-sans);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: var(--transition-smooth);
        }

        .btn-primary {
            background: var(--accent-blue);
            color: #ffffff;
        }
        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-success {
            background: var(--accent-emerald);
            color: #ffffff;
        }
        .btn-success:hover {
            background: #059669;
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover {
            background: var(--bg-primary);
            border-color: var(--border-hover);
        }

        .btn-danger {
            background: var(--accent-rose);
            color: #ffffff;
        }
        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 6px;
        }

        /* Forms (Shared) */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--font-sans);
            transition: var(--transition-smooth);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        /* Tables (Shared) */
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        .custom-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .custom-table th {
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 14px;
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .custom-table td {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            color: var(--text-primary);
        }

        .custom-table tr:hover td {
            background: #f8fafc;
        }

        /* Alerts (Shared) */
        .alert {
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
            border: 1px solid transparent;
        }
        .alert-danger {
            background: var(--accent-rose-bg);
            color: var(--accent-rose);
            border-color: rgba(239, 68, 68, 0.2);
        }
        .alert-success {
            background: var(--accent-emerald-bg);
            color: var(--accent-emerald);
            border-color: rgba(16, 185, 129, 0.2);
        }

        /* Badges (Shared) */
        .moto-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-disponible { background: var(--accent-emerald-bg); color: var(--accent-emerald); border: 1px solid rgba(16, 185, 129, 0.3); }
        .badge-en-financiacion { background: var(--accent-blue-bg); color: var(--accent-blue); border: 1px solid rgba(37, 99, 235, 0.3); }
        .badge-pago_vencido { background: var(--accent-rose-bg); color: var(--accent-rose); border: 1px solid rgba(239, 68, 68, 0.3); }
        .badge-pagada { background: var(--accent-emerald); color: #ffffff; }
        .badge-vendida { background: #64748b; color: #ffffff; }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .app-sidebar {
                display: none;
            }
            .main-content {
                margin-left: 0;
                width: 100%;
                padding: 20px;
            }
        }

        /* Financing New Specific Styles */
        .detail-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }
        @media (max-width: 1024px) {
            .detail-grid {
                grid-template-columns: 1fr;
            }
        }
        .detail-section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .detail-label {
            color: var(--text-secondary);
            font-size: 14px;
        }
        .detail-value {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
        }
        .detail-value.highlight {
            color: var(--accent-blue);
        }
        .detail-value.emerald {
            color: var(--accent-emerald);
        }
        .detail-value.orange {
            color: var(--accent-orange);
        }
    </style>
</head>
<body>
    <div id="new-financing-content">
        
        <div class="detail-grid">
            <!-- Form Card -->
            <div class="glass-panel">
                <h3 class="detail-section-title"><i class="fa-solid fa-file-signature"></i> Información de la Venta</h3>
                
                <form th:action="@{/financing/save}" method="post">
                    <input type="hidden" name="motorcycleId" th:value="${motorcycle.id}">
                    
                    <!-- Buyer section -->
                    <h4 style="margin: 20px 0 10px 0; color: var(--accent-blue);">1. Datos del Comprador</h4>
                    
                    <div class="form-group">
                        <label for="nombreCompleto" class="form-label">Nombre Completo del Comprador</label>
                        <input type="text" id="nombreCompleto" name="nombreCompleto" class="form-control" required placeholder="Ej. Juan Pérez">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="cedula" class="form-label">Cédula / Documento de Identidad</label>
                            <input type="text" id="cedula" name="cedula" class="form-control" required placeholder="Ej. 10023456">
                        </div>
                        <div class="form-group">
                            <label for="telefono" class="form-label">Teléfono</label>
                            <input type="text" id="telefono" name="telefono" class="form-control" required placeholder="Ej. 3001234567">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="direccion" class="form-label">Dirección de Residencia</label>
                            <input type="text" id="direccion" name="direccion" class="form-control" required placeholder="Ej. Calle 10 # 5-20">
                        </div>
                        <div class="form-group">
                            <label for="correo" class="form-label">Correo Electrónico (Opcional)</label>
                            <input type="email" id="correo" name="correo" class="form-control" placeholder="Ej. juan@correo.com">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="fechaCompra" class="form-label">Fecha de Compra</label>
                            <input type="date" id="fechaCompra" name="fechaCompra" class="form-control" required th:value="${fechaHoy}">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="buyerObservaciones" class="form-label">Observaciones sobre el comprador</label>
                        <textarea id="buyerObservaciones" name="buyerObservaciones" class="form-control" rows="2" placeholder="Detalles de contacto, referencias o fiadores..."></textarea>
                    </div>

                    <!-- Financing Section -->
                    <h4 style="margin: 30px 0 10px 0; color: var(--accent-blue);">2. Plan de Financiación</h4>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="valorTotal" class="form-label">Valor Total ($)</label>
                            <input type="number" step="0.01" id="valorTotal" name="valorTotal" class="form-control" th:value="${motorcycle.precioVenta}" required>
                        </div>
                        <div class="form-group">
                            <label for="cuotaInicial" class="form-label">Cuota Inicial ($) (Opcional)</label>
                            <input type="number" step="0.01" id="cuotaInicial" name="cuotaInicial" class="form-control" value="0">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Saldo Financiado</label>
                            <input type="text" id="saldoFinanciado" class="form-control" style="background: rgba(255,255,255,0.02); color: var(--accent-orange); font-weight: bold;" readonly>
                        </div>
                        <div class="form-group">
                            <label for="cuotasTotales" class="form-label">Número de Cuotas</label>
                            <input type="number" id="cuotasTotales" name="cuotasTotales" class="form-control" placeholder="Ej. 12" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="valorCuota" class="form-label">Valor de Cada Cuota ($)</label>
                            <input type="number" step="0.01" id="valorCuota" name="valorCuota" class="form-control" placeholder="Ej. 500000" required>
                        </div>
                        <div class="form-group">
                            <label for="frecuenciaPago" class="form-label">Frecuencia de Pago</label>
                            <select id="frecuenciaPago" name="frecuenciaPago" class="form-control" required style="background: var(--bg-secondary);">
                                <option value="MENSUAL">Mensual</option>
                                <option value="QUINCENAL">Quincenal</option>
                                <option value="SEMANAL">Semanal</option>
                                <option value="DIARIA">Diaria</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="fechaInicio" class="form-label">Fecha de Inicio de Pagos</label>
                            <input type="date" id="fechaInicio" name="fechaInicio" class="form-control" required th:value="${fechaHoy}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Fecha Fin Estimada</label>
                            <input type="text" id="fechaFinEstimada" class="form-control" style="background: rgba(255,255,255,0.02);" readonly placeholder="Se calcula al ingresar cuotas">
                        </div>
                    </div>

                    <div style="display: flex; gap: 15px; justify-content: flex-end; margin-top: 30px;">
                        <a th:href="@{/motorcycles}" class="btn btn-secondary">
                            Cancelar
                        </a>
                        <button type="submit" class="btn btn-success glowing-btn">
                            <i class="fa-solid fa-cash-register"></i> Registrar Venta
                        </button>
                    </div>
                </form>
            </div>

            <!-- Motorcycle Specs Card -->
            <div class="glass-panel" style="height: fit-content;">
                <h3 class="detail-section-title">Vehículo Seleccionado</h3>
                
                <div style="max-height: 200px; width: 100%; border-radius: 10px; overflow: hidden; margin-bottom: 20px; border: 1px solid var(--border-color); background: #1e293b; display: flex; align-items: center; justify-content: center;">
                    <img th:if="${motorcycle.fotoBase64 != null && !motorcycle.fotoBase64.isEmpty()}" th:src="${motorcycle.fotoBase64}" style="width: 100%; height: 100%; object-fit: cover;">
                    <i th:unless="${motorcycle.fotoBase64 != null && !motorcycle.fotoBase64.isEmpty()}" class="fa-solid fa-motorcycle" style="font-size: 50px; color: var(--text-secondary);"></i>
                </div>

                <h4 style="margin-bottom: 12px; color: #fff;" th:text="${motorcycle.marca + ' ' + motorcycle.modelo}">Honda CB</h4>
                
                <div class="detail-row">
                    <span class="detail-label">Placa:</span>
                    <span class="detail-value highlight" th:text="${motorcycle.placa}">ABC12D</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Año:</span>
                    <span class="detail-value" th:text="${motorcycle.anio}">2026</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Cilindraje:</span>
                    <span class="detail-value" th:text="${motorcycle.cilindraje}">190 cc</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Chasis / VIN:</span>
                    <span class="detail-value" th:text="${motorcycle.vin}">1234</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Número de Motor:</span>
                    <span class="detail-value" th:text="${motorcycle.numeroMotor}">1234</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Precio Catálogo:</span>
                    <span class="detail-value" th:text="${'$' + #numbers.formatDecimal(motorcycle.precioVenta, 1, 'POINT', 0, 'COMMA')}">$0.00</span>
                </div>
            </div>
        </div>

        <script>
            // Client-side calculations to improve UX
            const valorTotalInput = document.getElementById('valorTotal');
            const cuotaInicialInput = document.getElementById('cuotaInicial');
            const saldoFinanciadoInput = document.getElementById('saldoFinanciado');
            const cuotasTotalesInput = document.getElementById('cuotasTotales');
            const frecuenciaPagoInput = document.getElementById('frecuenciaPago');
            const fechaInicioInput = document.getElementById('fechaInicio');
            const fechaFinEstimadaInput = document.getElementById('fechaFinEstimada');

            function calculateFinancing() {
                const total = parseFloat(valorTotalInput.value) || 0;
                const inicial = parseFloat(cuotaInicialInput.value) || 0;
                const saldo = total - inicial;
                saldoFinanciadoInput.value = '$ ' + Math.round(saldo).toLocaleString('es-CO', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
                
                // Auto estimate installments if values are present
                const numCuotas = parseInt(cuotasTotalesInput.value) || 0;
                const valorCuotaInput = document.getElementById('valorCuota');
                if (numCuotas > 0 && (valorCuotaInput.value === '' || parseFloat(valorCuotaInput.value) === 0)) {
                    valorCuotaInput.value = Math.round(saldo / numCuotas);
                }

                calculateEndDate();
            }

            function calculateEndDate() {
                const numCuotas = parseInt(cuotasTotalesInput.value) || 0;
                const frecuencia = frecuenciaPagoInput.value;
                const fechaInicioStr = fechaInicioInput.value;

                if (!fechaInicioStr || numCuotas <= 0) {
                    fechaFinEstimadaInput.value = '';
                    return;
                }

                let date = new Date(fechaInicioStr + 'T00:00:00');
                if (isNaN(date.getTime())) return;

                if (frecuencia === 'DIARIA') {
                    date.setDate(date.getDate() + numCuotas);
                } else if (frecuencia === 'SEMANAL') {
                    date.setDate(date.getDate() + (numCuotas * 7));
                } else if (frecuencia === 'QUINCENAL') {
                    date.setDate(date.getDate() + (numCuotas * 14));
                } else if (frecuencia === 'MENSUAL') {
                    date.setMonth(date.getMonth() + numCuotas);
                }

                const day = String(date.getDate()).padStart(2, '0');
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const year = date.getFullYear();
                fechaFinEstimadaInput.value = `${day}/${month}/${year}`;
            }

            valorTotalInput.addEventListener('input', calculateFinancing);
            cuotaInicialInput.addEventListener('input', calculateFinancing);
            cuotasTotalesInput.addEventListener('input', calculateFinancing);
            frecuenciaPagoInput.addEventListener('change', calculateEndDate);
            fechaInicioInput.addEventListener('change', calculateEndDate);

            // Run on startup
            calculateFinancing();
        </script>
    </div>
</body>
</html>
