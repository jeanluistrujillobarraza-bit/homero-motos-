<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: html(title='Administración de Usuarios', pageTitle='Gestión de Usuarios Internos', content=~{::#users-content}, extraStyle=~{::style})}">
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-sidebar: #0f172a;
            --border-color: #e2e8f0;
            --border-hover: #cbd5e1;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent-blue: #2563eb;
            --accent-blue-bg: #eff6ff;
            --accent-emerald: #10b981;
            --accent-emerald-bg: #ecfdf5;
            --accent-orange: #f59e0b;
            --accent-orange-bg: #fffbeb;
            --accent-rose: #ef4444;
            --accent-rose-bg: #fef2f2;
            --accent-purple: #8b5cf6;
            --accent-purple-bg: #f5f3ff;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --sidebar-width: 260px;
            --border-radius: 12px;
            --transition-smooth: all 0.2s ease-in-out;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Clean Panel (White Card) */
        .glass-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px -1px rgba(0, 0, 0, 0.05);
            transition: var(--transition-smooth);
        }
        .glass-panel:hover {
            border-color: var(--border-hover);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
        }

        /* App Layout */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styling */
        .app-sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 40px;
            letter-spacing: -0.5px;
        }
        .sidebar-logo i {
            color: var(--accent-blue);
        }

        .sidebar-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
            transition: var(--transition-smooth);
        }

        .sidebar-link:hover, .sidebar-link.active {
            color: #ffffff;
        }
        .sidebar-link:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .sidebar-link.active {
            background: #1e293b;
            font-weight: 600;
        }

        .sidebar-user {
            margin-top: auto;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-user-name {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-user-role {
            font-size: 11px;
            color: var(--accent-emerald);
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .btn-logout {
            margin-top: 10px;
            display: inline-block;
            color: var(--accent-rose);
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            transition: var(--transition-smooth);
        }
        .btn-logout:hover {
            text-decoration: underline;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 40px;
            max-width: 1400px;
            width: calc(100% - var(--sidebar-width));
        }

        /* Header */
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .search-bar {
            display: flex;
            gap: 10px;
            max-width: 450px;
            width: 100%;
        }

        .input-search {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 10px 18px;
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--font-sans);
            transition: var(--transition-smooth);
        }
        .input-search:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: var(--font-sans);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: var(--transition-smooth);
        }

        .btn-primary {
            background: var(--accent-blue);
            color: #ffffff;
        }
        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-success {
            background: var(--accent-emerald);
            color: #ffffff;
        }
        .btn-success:hover {
            background: #059669;
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover {
            background: var(--bg-primary);
            border-color: var(--border-hover);
        }

        .btn-danger {
            background: var(--accent-rose);
            color: #ffffff;
        }
        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 6px;
        }

        /* Forms (Shared) */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--font-sans);
            transition: var(--transition-smooth);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        /* Tables (Shared) */
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        .custom-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .custom-table th {
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 14px;
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .custom-table td {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            color: var(--text-primary);
        }

        .custom-table tr:hover td {
            background: #f8fafc;
        }

        /* Alerts (Shared) */
        .alert {
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
            border: 1px solid transparent;
        }
        .alert-danger {
            background: var(--accent-rose-bg);
            color: var(--accent-rose);
            border-color: rgba(239, 68, 68, 0.2);
        }
        .alert-success {
            background: var(--accent-emerald-bg);
            color: var(--accent-emerald);
            border-color: rgba(16, 185, 129, 0.2);
        }

        /* Badges (Shared) */
        .moto-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-disponible { background: var(--accent-emerald-bg); color: var(--accent-emerald); border: 1px solid rgba(16, 185, 129, 0.3); }
        .badge-en-financiacion { background: var(--accent-blue-bg); color: var(--accent-blue); border: 1px solid rgba(37, 99, 235, 0.3); }
        .badge-pago_vencido { background: var(--accent-rose-bg); color: var(--accent-rose); border: 1px solid rgba(239, 68, 68, 0.3); }
        .badge-pagada { background: var(--accent-emerald); color: #ffffff; }
        .badge-vendida { background: #64748b; color: #ffffff; }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .app-sidebar {
                display: none;
            }
            .main-content {
                margin-left: 0;
                width: 100%;
                padding: 20px;
            }
        }

        /* User Management Specific Styles */
        .role-badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
        }
        .role-admin {
            background: var(--accent-rose-bg);
            color: var(--accent-rose);
        }
        .role-employee {
            background: var(--accent-blue-bg);
            color: var(--accent-blue);
        }
        .detail-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }
        @media (max-width: 1024px) {
            .detail-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="users-content">
        <div class="detail-grid">
            
            <!-- Users List -->
            <div class="glass-panel">
                <h3 class="detail-section-title">Usuarios Registrados</h3>
                
                <div class="table-container" style="margin-top: 0;">
                    <table class="custom-table">
                        <thead>
                            <tr>
                                <th>Nombre Completo</th>
                                <th>Usuario</th>
                                <th>Rol</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.fullName}">Administrador</td>
                                <td th:text="${user.username}">admin</td>
                                <td>
                                    <span class="role-badge" 
                                          th:classappend="${user.role == 'ROLE_ADMIN' ? 'role-admin' : 'role-employee'}" 
                                          th:text="${user.role == 'ROLE_ADMIN' ? 'ADMINISTRADOR' : 'EMPLEADO'}">
                                        ADMIN
                                    </span>
                                </td>
                                <td>
                                    <span th:if="${user.active}" class="moto-badge badge-disponible" style="position: static; font-size: 11px;">ACTIVO</span>
                                    <span th:unless="${user.active}" class="moto-badge badge-en-financiacion" style="position: static; background: rgba(239, 68, 68, 0.15); color: var(--accent-rose); border-color: var(--accent-rose); font-size: 11px;">INACTIVO</span>
                                </td>
                                <td>
                                    <!-- Edit details (JS population) -->
                                    <button class="btn btn-secondary btn-sm" th:onclick="editUser([[${user.id}]], [[${user.username}]], [[${user.fullName}]], [[${user.role}]])" title="Editar">
                                        <i class="fa-solid fa-pen"></i>
                                    </button>
                                    <!-- Toggle status -->
                                    <a th:href="@{/users/toggle/{id}(id=${user.id})}" 
                                       class="btn btn-sm" 
                                       th:classappend="${user.active ? 'btn-danger' : 'btn-success'}"
                                       th:text="${user.active ? 'Desactivar' : 'Activar'}"
                                       onclick="return confirm('¿Está seguro de cambiar el estado de este usuario?');">
                                        Estado
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Create / Edit User Form -->
            <div class="glass-panel" style="height: fit-content;">
                <h3 class="detail-section-title" id="form-title">Registrar Nuevo Usuario</h3>
                
                <form th:action="@{/users/save}" th:object="${newUser}" method="post" id="user-form">
                    <input type="hidden" th:field="*{id}" id="user-id">

                    <div class="form-group">
                        <label for="fullName" class="form-label">Nombre Completo</label>
                        <input type="text" id="fullName" th:field="*{fullName}" class="form-control" placeholder="Ej. Carlos Martínez" required>
                    </div>

                    <div class="form-group">
                        <label for="username" class="form-label">Nombre de Usuario</label>
                        <input type="text" id="username" th:field="*{username}" class="form-control" placeholder="Ej. cmartinez" required>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" id="password" th:field="*{password}" class="form-control" placeholder="Ingrese contraseña" required>
                        <span id="password-help" style="font-size: 11px; color: var(--text-secondary); margin-top: 4px; display: none;">Deje en blanco si no desea cambiar la contraseña del usuario.</span>
                    </div>

                    <div class="form-group">
                        <label for="role" class="form-label">Rol del Sistema</label>
                        <select id="role" th:field="*{role}" class="form-control" required style="background: var(--bg-secondary);">
                            <option value="ROLE_EMPLOYEE">Empleado (Ventas / Cobros)</option>
                            <option value="ROLE_ADMIN">Administrador (Control Total)</option>
                        </select>
                    </div>

                    <div style="display: flex; gap: 10px; margin-top: 20px;">
                        <button type="button" id="btn-cancel-edit" class="btn btn-secondary" style="display: none;" onclick="resetUserForm()">
                            Cancelar
                        </button>
                        <button type="submit" class="btn btn-success glowing-btn" style="flex: 1;">
                            <i class="fa-solid fa-user-plus"></i> <span id="btn-submit-text">Crear Usuario</span>
                        </button>
                    </div>
                </form>
            </div>

        </div>

        <script>
            function editUser(id, username, fullName, role) {
                document.getElementById('form-title').innerText = 'Editar Usuario';
                document.getElementById('user-id').value = id;
                document.getElementById('username').value = username;
                document.getElementById('fullName').value = fullName;
                document.getElementById('role').value = role;
                
                // For editing, password is not strictly required
                const pwdInput = document.getElementById('password');
                pwdInput.required = false;
                pwdInput.placeholder = 'Nueva contraseña (opcional)';
                document.getElementById('password-help').style.display = 'block';

                document.getElementById('btn-cancel-edit').style.display = 'inline-block';
                document.getElementById('btn-submit-text').innerText = 'Actualizar Usuario';
            }

            function resetUserForm() {
                document.getElementById('form-title').innerText = 'Registrar Nuevo Usuario';
                document.getElementById('user-id').value = '';
                document.getElementById('username').value = '';
                document.getElementById('fullName').value = '';
                document.getElementById('role').value = 'ROLE_EMPLOYEE';
                
                const pwdInput = document.getElementById('password');
                pwdInput.required = true;
                pwdInput.placeholder = 'Ingrese contraseña';
                document.getElementById('password-help').style.display = 'none';

                document.getElementById('btn-cancel-edit').style.display = 'none';
                document.getElementById('btn-submit-text').innerText = 'Crear Usuario';
            }
        </script>
    </div>
</body>
</html>
