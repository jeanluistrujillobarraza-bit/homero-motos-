<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Homero Motos'"></title>
    <!-- Add FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-sidebar: #0f172a;
            --border-color: #e2e8f0;
            --border-hover: #cbd5e1;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent-blue: #2563eb;
            --accent-blue-bg: #eff6ff;
            --accent-emerald: #10b981;
            --accent-emerald-bg: #ecfdf5;
            --accent-orange: #f59e0b;
            --accent-orange-bg: #fffbeb;
            --accent-rose: #ef4444;
            --accent-rose-bg: #fef2f2;
            --accent-purple: #8b5cf6;
            --accent-purple-bg: #f5f3ff;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --sidebar-width: 260px;
            --border-radius: 12px;
            --transition-smooth: all 0.2s ease-in-out;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
            background-image: linear-gradient(rgba(248, 250, 252, 0.70), rgba(248, 250, 252, 0.70)), 
                             url('/hmfondo.jpg') !important;
            background-attachment: fixed !important;
            background-repeat: repeat !important;
            background-size: 320px !important;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .app-sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 40px;
            letter-spacing: -0.5px;
        }
        .sidebar-logo i {
            color: var(--accent-blue);
        }

        .sidebar-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
            transition: var(--transition-smooth);
        }

        .sidebar-link:hover, .sidebar-link.active {
            color: #ffffff;
        }
        .sidebar-link:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .sidebar-link.active {
            background: #1e293b;
            font-weight: 600;
        }

        .sidebar-user {
            margin-top: auto;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-user-name {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-user-role {
            font-size: 11px;
            color: var(--accent-emerald);
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .btn-logout {
            margin-top: 10px;
            display: inline-block;
            color: #f87171;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
        }
        .btn-logout:hover {
            text-decoration: underline;
        }

        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 40px;
            max-width: 1400px;
            width: calc(100% - var(--sidebar-width));
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            max-width: 450px;
            width: 100%;
        }

        .input-search {
            flex: 1;
            background: #ffffff;
            border: 1px solid var(--border-color);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: var(--transition-smooth);
        }
        .input-search:focus {
            border-color: var(--border-hover);
        }
    </style>
    <th:block th:if="${extraStyle != null}" th:replace="${extraStyle}"></th:block>
    <style>
        /* Responsive CSS Overrides */
        @media (max-width: 992px) {
            .app-sidebar {
                position: fixed !important;
                left: 0 !important;
                top: 0 !important;
                height: 100vh !important;
                width: 280px !important;
                transform: translateX(-100%) !important;
                transition: transform 0.3s ease-in-out !important;
                z-index: 1050 !important;
                box-shadow: 5px 0 25px rgba(0,0,0,0.15) !important;
            }
            .app-sidebar.active {
                transform: translateX(0) !important;
            }
            #sidebar-close {
                display: inline-block !important;
            }
            .main-content {
                margin-left: 0 !important;
                width: 100% !important;
                padding: 15px !important;
                max-width: 100% !important;
            }
            #sidebar-toggle {
                display: flex !important;
            }
            .content-header {
                flex-direction: column !important;
                align-items: stretch !important;
                gap: 15px !important;
            }
            .search-bar {
                max-width: 100% !important;
                width: 100% !important;
            }
            
            /* Responsive Grid Systems used in dashboard and forms */
            .dashboard-grid, .stats-grid, .grid-2, .grid-3, .grid-4, 
            .info-grid, .detail-grid, .form-row, .grid-form, .motorcycles-grid, .financing-grid {
                grid-template-columns: 1fr !important;
                gap: 15px !important;
            }
            
            /* Tables scroll wrapper */
            .table-container {
                overflow-x: auto !important;
                width: 100% !important;
                -webkit-overflow-scrolling: touch;
            }
            
            /* Modal or detail panel responsive layout */
            .detail-container, .modal-content {
                width: 95% !important;
                padding: 15px !important;
            }
        }
        
        /* Mobile toggle button styling */
        .btn-toggle {
            background: #ffffff;
            border: 1px solid var(--border-color, #cbd5e1);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-primary, #0f172a);
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .btn-toggle:hover {
            background: #f1f5f9;
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggleBtn = document.getElementById('sidebar-toggle');
            const closeBtn = document.getElementById('sidebar-close');
            const sidebar = document.querySelector('.app-sidebar');
            
            if (toggleBtn && sidebar) {
                toggleBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    sidebar.classList.add('active');
                });
            }
            if (closeBtn && sidebar) {
                closeBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    sidebar.classList.remove('active');
                });
            }
            
            // Close sidebar when clicking outside of it
            document.addEventListener('click', function(e) {
                if (window.innerWidth <= 992 && sidebar && sidebar.classList.contains('active')) {
                    if (!sidebar.contains(e.target) && !toggleBtn.contains(e.target)) {
                        sidebar.classList.remove('active');
                    }
                }
            });
        });
    </script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="app-sidebar">
            <div class="sidebar-logo" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <img th:src="@{/hm1.gif}" alt="Logo" style="height: 38px; width: auto; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1);">
                    <span style="font-weight: 800; font-size: 18px; color: #ffffff;">Homero Motos</span>
                </div>
                <button id="sidebar-close" style="display: none; background: transparent; border: none; color: #94a3b8; font-size: 20px; cursor: pointer; padding: 0 5px;">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <ul class="sidebar-menu">
                <li>
                    <a th:href="@{/}" class="sidebar-link" th:classappend="${currentUri == '/' ? 'active' : ''}">
                        <i class="fa-solid fa-chart-line"></i> Dashboard
                    </a>
                </li>
                <li>
                    <a th:href="@{/motorcycles}" class="sidebar-link" th:classappend="${currentUri != null && currentUri.startsWith('/motorcycles') ? 'active' : ''}">
                        <i class="fa-solid fa-motorcycle"></i> Motocicletas
                    </a>
                </li>
                <li>
                    <a th:href="@{/financing}" class="sidebar-link" th:classappend="${currentUri != null && currentUri.startsWith('/financing') ? 'active' : ''}">
                        <i class="fa-solid fa-file-invoice-dollar"></i> Financiaciones
                    </a>
                </li>
                <li>
                    <a th:href="@{/payments}" class="sidebar-link" th:classappend="${currentUri != null && currentUri.startsWith('/payments') ? 'active' : ''}">
                        <i class="fa-solid fa-vault"></i> Recaudos
                    </a>
                </li>
                <li>
                    <a th:href="@{/clients}" class="sidebar-link" th:classappend="${currentUri != null && currentUri.startsWith('/clients') ? 'active' : ''}">
                        <i class="fa-solid fa-users"></i> Clientes
                    </a>
                </li>
                <li sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_SUPER_ADMIN', 'ROLE_BUSINESS_ADMIN')">
                    <a th:href="@{/users}" class="sidebar-link" th:classappend="${currentUri != null && currentUri.startsWith('/users') ? 'active' : ''}">
                        <i class="fa-solid fa-users-cog"></i> Usuarios
                    </a>
                </li>
                <li sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_SUPER_ADMIN', 'ROLE_BUSINESS_ADMIN')">
                    <a th:href="@{/config}" class="sidebar-link" th:classappend="${currentUri != null && currentUri.startsWith('/config') ? 'active' : ''}">
                        <i class="fa-solid fa-gears"></i> Configuración
                    </a>
                </li>
                <li sec:authorize="hasRole('ROLE_SUPER_ADMIN')">
                    <a th:href="@{/superadmin}" class="sidebar-link" th:classappend="${currentUri != null && currentUri.startsWith('/superadmin') ? 'active' : ''}">
                        <i class="fa-solid fa-key"></i> Súper Admin
                    </a>
                </li>
            </ul>

            <!-- User Panel -->
            <div class="sidebar-user" sec:authorize="isAuthenticated()">
                <div class="sidebar-user-name" th:text="${#authentication.name}">Usuario</div>
                <div class="sidebar-user-role" sec:authentication="principal.authorities[0].authority">ROL</div>
                <a th:href="@{/logout}" class="btn-logout">
                    <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header bar with search -->
            <header class="content-header">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <button id="sidebar-toggle" class="btn-toggle">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <h1 class="page-title" th:text="${pageTitle}">Página</h1>
                </div>
                
                <form th:action="@{/financing/search}" method="get" class="search-bar">
                    <input type="text" name="query" class="input-search" placeholder="Buscar placa, cédula o comprador..." required>
                    <button type="submit" class="btn btn-primary glowing-btn">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </form>
            </header>

            <!-- Error and Success Messages -->
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${param.error}" class="alert alert-danger" th:text="${param.error}"></div>
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${param.successMessage}" class="alert alert-success" th:text="${param.successMessage}"></div>
            <div th:if="${param.success}" class="alert alert-success" th:text="${param.success}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <!-- Page-specific content insertion -->
            <div th:replace="${content}"></div>
        </main>
    </div>
</body>
</html>
